<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Writer | Suite Profesional 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --slate-950: #020617; --slate-900: #0f172a; --slate-800: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--slate-950); color: #f8fafc; overflow: hidden; }
        .script-font { font-family: 'Courier Prime', monospace; font-size: 12pt; line-height: 1.2; }
        
        /* Contenedor del Papel */
        .paper-container { background-color: #334155; box-shadow: inset 0 0 100px rgba(0,0,0,0.5); }
        #paper {
            width: 210mm; min-height: 297mm; background: white; color: black;
            padding: 25mm; margin: 40px auto; outline: none; white-space: pre-wrap;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative;
        }

        /* Estilos de Guion Estándar */
        .slugline { font-weight: bold; text-transform: uppercase; margin-top: 25px; margin-bottom: 10px; }
        .action { margin-top: 10px; margin-bottom: 10px; }
        .character { width: 50%; margin: 20px auto 0 auto; text-align: center; text-transform: uppercase; }
        .parenthetical { width: 35%; margin: 0 auto; text-align: center; }
        .parenthetical::before { content: "("; } .parenthetical::after { content: ")"; }
        .dialogue { width: 70%; margin: 0 auto 10px auto; text-align: center; }
        .transition { width: 30%; margin: 20px 0 0 auto; text-align: right; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="landing" class="h-screen w-full flex flex-col items-center justify-center bg-slate-950 px-6 transition-opacity duration-500">
        <div class="text-center">
            <h1 class="text-7xl font-extrabold mb-4 tracking-tighter italic">E-<span class="text-blue-500">WRITER</span></h1>
            <p class="text-slate-400 mb-10 text-lg font-light tracking-wide">EL ESTÁNDAR PROFESIONAL PARA GUIONISTAS DE CINE</p>
            <button onclick="authAction('login')" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-bold shadow-2xl shadow-blue-500/20 transition-all transform hover:scale-105">
                Empezar a escribir con Google
            </button>
        </div>
    </div>

    <div id="editor-ui" class="hidden h-screen flex flex-col fade-in">
        <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-6">
                <span class="text-blue-500 font-black text-xl">EW</span>
                <input type="text" id="script-title" class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-1 text-slate-200 w-80 text-sm focus:outline-none focus:border-blue-500" value="Guion sin título">
            </div>
            <div class="flex items-center gap-6">
                <span id="save-indicator" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Sincronizado</span>
                <div class="flex items-center gap-3">
                    <img id="user-img" src="" class="w-8 h-8 rounded-full border border-slate-700">
                    <button onclick="authAction('logout')" class="text-xs text-slate-500 hover:text-white transition-colors">SALIR</button>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-16 bg-slate-950 border-r border-slate-800 flex flex-col items-center py-6 gap-8 shrink-0">
                <div class="flex flex-col gap-6 border-b border-slate-800 pb-6 items-center w-full">
                    <button onclick="newProject()" title="Nuevo Proyecto" class="text-blue-400 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                    <button onclick="cloudSave()" title="Guardar Ahora" class="text-emerald-500 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                    </button>
                    <button onclick="openLoadModal()" title="Cargar Proyectos" class="text-amber-500 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9l-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </button>
                    <button onclick="exportPDF()" title="Exportar PDF" class="text-rose-500 hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </button>
                </div>
                <div class="flex flex-col gap-6 text-xl">
                    <button onclick="format('slugline')" title="Escena">🎬</button>
                    <button onclick="format('action')" title="Acción">📝</button>
                    <button onclick="format('character')" title="Personaje">👤</button>
                    <button onclick="format('dialogue')" title="Diálogo">🗣️</button>
                </div>
            </aside>

            <main class="flex-1 paper-container overflow-y-auto custom-scrollbar scroll-smooth">
                <div id="paper" class="script-font" contenteditable="true" spellcheck="true">
                    <div class="slugline">INT. EJEMPLO - DÍA</div>
                    <div class="action">Comienza tu historia aquí...</div>
                </div>
            </main>

            <aside class="w-72 bg-slate-900 border-l border-slate-800 p-6 flex flex-col gap-8 shrink-0">
                <div>
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Métricas</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                            <p class="text-[10px] text-slate-500 uppercase">Escenas</p>
                            <p id="stat-scenes" class="text-2xl font-bold">1</p>
                        </div>
                        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                            <p class="text-[10px] text-slate-500 uppercase">Páginas</p>
                            <p id="stat-pages" class="text-2xl font-bold">1</p>
                        </div>
                    </div>
                </div>

                <div class="flex-1 flex flex-col overflow-hidden">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Personajes</h3>
                    <div id="character-list" class="flex flex-wrap gap-2 overflow-y-auto content-start pb-4">
                        </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="load-modal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Mis Proyectos</h2>
            <div id="projects-list" class="space-y-3 max-h-80 overflow-y-auto mb-8 pr-2">
                </div>
            <button onclick="closeModal()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold transition-colors">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVpaNVbN_odbvwUzLwLCJEvCcVaU58mFo",
            authDomain: "ewriter-ed922.firebaseapp.com",
            projectId: "ewriter-ed922",
            storageBucket: "ewriter-ed922.firebasestorage.app",
            messagingSenderId: "74648101150",
            appId: "1:74648101150:web:a390feefe57d65e09be90f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let userUID = null;

        // --- AUTENTICACIÓN ---
        window.authAction = (t) => t === 'login' ? signInWithPopup(auth, provider) : signOut(auth);
        
        onAuthStateChanged(auth, u => {
            if(u) {
                userUID = u.uid;
                document.getElementById('landing').classList.add('hidden');
                document.getElementById('editor-ui').classList.remove('hidden');
                document.getElementById('user-img').src = u.photoURL;
                openLoadModal();
            } else {
                userUID = null;
                document.getElementById('landing').classList.remove('hidden');
                document.getElementById('editor-ui').classList.add('hidden');
            }
        });

        // --- SISTEMA DE ANÁLISIS (REAL-TIME) ---
        function analyzeScript() {
            const paper = document.getElementById('paper');
            
            // 1. Contar Escenas
            const scenes = paper.querySelectorAll('.slugline').length;
            document.getElementById('stat-scenes').innerText = scenes || 0;

            // 2. Extraer Personajes Únicos
            const charElements = Array.from(paper.querySelectorAll('.character'));
            const uniqueChars = [...new Set(charElements.map(el => el.innerText.trim().toUpperCase()))].filter(name => name.length > 0);
            
            const listContainer = document.getElementById('character-list');
            listContainer.innerHTML = uniqueChars.map(name => 
                `<span class="px-3 py-1 bg-blue-500/10 border border-blue-500/30 text-blue-400 text-[10px] font-bold rounded-lg uppercase tracking-wider">${name}</span>`
            ).join('');

            // 3. Estimación de Páginas (1122px por A4 aprox)
            const pages = Math.ceil(paper.scrollHeight / 1122);
            document.getElementById('stat-pages').innerText = pages || 1;
        }

        // --- ACCIONES DEL EDITOR ---
        window.format = (type) => {
            document.execCommand('formatBlock', false, 'div');
            const sel = window.getSelection();
            let node = sel.anchorNode;
            if (node.nodeType === 3) node = node.parentNode;
            node.className = type;
            analyzeScript();
            autoSave();
        };

        window.newProject = async () => {
            if(confirm("¿Guardar cambios antes de crear uno nuevo?")) await cloudSave();
            document.getElementById('script-title').value = "Nuevo Proyecto";
            document.getElementById('paper').innerHTML = '<div class="slugline">INT. NUEVA ESCENA - DÍA</div><div class="action">Comienza a escribir...</div>';
            analyzeScript();
        };

        window.cloudSave = async () => {
            if(!userUID) return;
            const title = document.getElementById('script-title').value;
            const indicator = document.getElementById('save-indicator');
            indicator.innerText = "Guardando...";
            try {
                await setDoc(doc(db, "users", userUID, "projects", title), {
                    title,
                    html: document.getElementById('paper').innerHTML,
                    updated: new Date()
                });
                indicator.innerText = "Sincronizado";
            } catch (e) { indicator.innerText = "Error"; }
        };

        window.openLoadModal = async () => {
            const list = document.getElementById('projects-list');
            list.innerHTML = '<p class="text-slate-500 animate-pulse text-sm">Conectando a la nube...</p>';
            document.getElementById('load-modal').classList.remove('hidden');
            const snap = await getDocs(collection(db, "users", userUID, "projects"));
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = "group flex items-center justify-between p-4 bg-slate-800/50 hover:bg-blue-600/20 border border-slate-700 hover:border-blue-500 rounded-2xl cursor-pointer transition-all";
                div.innerHTML = `<div><p class="font-bold text-slate-200">${p.title}</p><p class="text-[9px] text-slate-500 uppercase italic">Última edición reciente</p></div>`;
                div.onclick = () => {
                    document.getElementById('paper').innerHTML = p.html;
                    document.getElementById('script-title').value = p.title;
                    closeModal();
                    analyzeScript();
                };
                list.appendChild(div);
            });
        };

        window.closeModal = () => document.getElementById('load-modal').classList.add('hidden');

        window.exportPDF = () => {
            const opt = {
                margin: 0,
                filename: `${document.getElementById('script-title').value}.pdf`,
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().from(document.getElementById('paper')).set(opt).save();
        };

        // --- LÓGICA DE TECLADO ---
        let timer;
        const autoSave = () => { clearTimeout(timer); timer = setTimeout(cloudSave, 3000); };

        document.getElementById('paper').addEventListener('input', () => {
            analyzeScript();
            autoSave();
        });

        document.getElementById('paper').addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                format('character');
            }
            if (e.key === 'Enter') {
                // Inteligencia de flujo: Si estamos en SLUGLINE, el siguiente es ACTION
                setTimeout(() => {
                    const sel = window.getSelection();
                    let cur = sel.anchorNode;
                    if (cur.nodeType === 3) cur = cur.parentNode;
                    
                    const prev = cur.previousSibling;
                    if (prev && prev.classList.contains('slugline')) {
                        format('action');
                    } else if (prev && prev.classList.contains('character')) {
                        format('dialogue');
                    }
                }, 10);
            }
        });

        window.format = format; // Exponer a onclick
    </script>
</body>
</html>
