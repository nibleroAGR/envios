<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Writer | Suite Profesional de Guion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --slate-950: #020617; --slate-900: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--slate-950); color: #f8fafc; margin: 0; overflow: hidden; }
        
        /* Tipografía de Guion */
        .script-font { font-family: 'Courier Prime', monospace; font-size: 12pt; line-height: 1.2; }
        
        /* El Papel Virtual */
        #paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            color: black;
            padding: 25mm;
            margin: 40px auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            outline: none;
            white-space: pre-wrap;
        }

        /* Formatos Estándar */
        .slugline { font-weight: bold; text-transform: uppercase; margin-top: 25px; }
        .action { margin-top: 15px; }
        .character { width: 55%; margin: 20px auto 0 auto; text-align: center; text-transform: uppercase; }
        .parenthetical { width: 35%; margin: 0 auto; text-align: center; }
        .parenthetical::before { content: "("; } .parenthetical::after { content: ")"; }
        .dialogue { width: 75%; margin: 0 auto 10px auto; text-align: center; }
        .transition { width: 30%; margin: 20px 0 0 auto; text-align: right; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
        
        /* Animaciones */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="landing" class="h-screen w-full flex flex-col items-center justify-center bg-gradient-to-b from-slate-950 to-slate-900 px-6">
        <div class="max-w-3xl text-center fade-in">
            <div class="inline-block px-4 py-1.5 mb-6 text-sm font-semibold tracking-wider text-blue-400 uppercase bg-blue-400/10 rounded-full border border-blue-400/20">
                Lanzamiento 2026
            </div>
            <h1 class="text-7xl font-extrabold mb-6 tracking-tight">E-<span class="text-blue-500">Writer</span></h1>
            <p class="text-xl text-slate-400 mb-12 font-light leading-relaxed">
                Escribe tu próxima obra maestra con el estándar de Hollywood. 
                Sincronización en la nube, formato automático y seguridad de grado profesional.
            </p>
            
            <button onclick="authAction('login')" class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-blue-600 font-pj rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 hover:bg-blue-500 shadow-lg shadow-blue-500/20">
                <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-2.21 5.42-7.84 5.42-4.84 0-8.8-4.01-8.8-9s3.96-9 8.8-9c2.75 0 4.59 1.17 5.64 2.18l2.58-2.48C18.69 1.17 15.84 0 12.48 0 5.58 0 0 5.58 0 12.48s5.58 12.48 12.48 12.48c7.2 0 12-5.06 12-12.24 0-.82-.08-1.44-.24-2.11h-11.76z"/></svg>
                Acceder con Google
            </button>
        </div>
    </div>

    <div id="editor-ui" class="hidden h-screen flex flex-col">
        <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-6">
                <span class="text-blue-500 font-black text-xl tracking-tighter">EW</span>
                <input type="text" id="script-title" class="bg-transparent border-none text-slate-300 font-medium focus:ring-0 w-64 text-sm" value="Mi Guion sin título">
            </div>
            
            <div class="flex items-center gap-5">
                <span id="save-indicator" class="text-[10px] uppercase tracking-widest text-slate-500">Sincronizado</span>
                <div class="h-8 w-8 rounded-full border border-slate-700 overflow-hidden">
                    <img id="user-img" src="" alt="">
                </div>
                <button onclick="authAction('logout')" class="text-xs font-bold text-slate-500 hover:text-white transition-colors">SALIR</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-16 bg-slate-900 border-r border-slate-800 flex flex-col items-center py-8 gap-10 shrink-0">
                <div class="flex flex-col gap-6 items-center border-b border-slate-800 pb-8 w-full">
                    <button onclick="cloudSave()" title="Guardar Versión" class="text-emerald-500 hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                    </button>
                    <button onclick="cloudLoad()" title="Cargar Versión" class="text-blue-500 hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </button>
                </div>
                <div class="flex flex-col gap-6 items-center">
                    <button onclick="format('slugline')" title="Escena" class="text-slate-400 hover:text-white">🎬</button>
                    <button onclick="format('action')" title="Acción" class="text-slate-400 hover:text-white">📝</button>
                    <button onclick="format('character')" title="Personaje" class="text-slate-400 hover:text-white">👤</button>
                    <button onclick="format('parenthetical')" title="Paréntesis" class="text-slate-400 hover:text-white">💬</button>
                    <button onclick="format('dialogue')" title="Diálogo" class="text-slate-400 hover:text-white">🗣️</button>
                    <button onclick="format('transition')" title="Transición" class="text-slate-400 hover:text-white">🎞️</button>
                </div>
            </aside>

            <main class="flex-1 bg-slate-800/50 overflow-y-auto scroll-smooth">
                <div id="paper" class="script-font" contenteditable="true" spellcheck="true">
                    <div class="slugline">INT. OFICINA - DÍA</div>
                    <div class="action">Escribe aquí tu historia...</div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVpaNVbN_odbvwUzLwLCJEvCcVaU58mFo",
            authDomain: "ewriter-ed922.firebaseapp.com",
            projectId: "ewriter-ed922",
            storageBucket: "ewriter-ed922.firebasestorage.app",
            messagingSenderId: "74648101150",
            appId: "1:74648101150:web:a390feefe57d65e09be90f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let userUID = null;

        // --- GESTIÓN DE INTERFAZ Y SESIÓN ---
        window.authAction = (type) => {
            if(type === 'login') signInWithPopup(auth, provider);
            if(type === 'logout') signOut(auth);
        }

        onAuthStateChanged(auth, (user) => {
            const landing = document.getElementById('landing');
            const editorUI = document.getElementById('editor-ui');
            
            if (user) {
                userUID = user.uid;
                landing.classList.add('hidden');
                editorUI.classList.remove('hidden');
                document.getElementById('user-img').src = user.photoURL;
                cloudLoad(); // Cargar automáticamente al entrar
            } else {
                userUID = null;
                landing.classList.remove('hidden');
                editorUI.classList.add('hidden');
            }
        });

        // --- FUNCIONES DEL EDITOR ---
        window.format = (cls) => {
            document.execCommand('formatBlock', false, 'div');
            const sel = window.getSelection();
            let node = sel.anchorNode;
            if (node.nodeType === 3) node = node.parentNode;
            node.className = cls;
            autoSaveTrigger();
        }

        // --- NUBE (GUARDAR Y CARGAR) ---
        window.cloudSave = async () => {
            if(!userUID) return;
            const indicator = document.getElementById('save-indicator');
            indicator.innerText = "Guardando...";
            
            try {
                await setDoc(doc(db, "users", userUID, "data", "master"), {
                    title: document.getElementById('script-title').value,
                    html: document.getElementById('paper').innerHTML,
                    date: new Date()
                });
                indicator.innerText = "Sincronizado";
            } catch (e) { console.error(e); indicator.innerText = "Error"; }
        }

        window.cloudLoad = async () => {
            if(!userUID) return;
            const snap = await getDoc(doc(db, "users", userUID, "data", "master"));
            if(snap.exists()) {
                document.getElementById('paper').innerHTML = snap.data().html;
                document.getElementById('script-title').value = snap.data().title;
            }
        }

        // --- INTELIGENCIA DE TECLADO ---
        let autoSaveTimer;
        const autoSaveTrigger = () => {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(cloudSave, 2000);
        }

        document.getElementById('paper').addEventListener('input', autoSaveTrigger);
        document.getElementById('script-title').addEventListener('input', autoSaveTrigger);

        document.getElementById('paper').addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                format('character');
            }
            if (e.key === 'Enter') {
                // Pequeña lógica para que tras personaje vaya diálogo
                setTimeout(() => {
                    const cur = window.getSelection().anchorNode.parentNode;
                    if(cur.previousSibling && cur.previousSibling.className === 'character') format('dialogue');
                }, 10);
            }
        });

    </script>
</body>
</html>
