<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Writer Pro | Estándar Cinematográfico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --slate-950: #020617; --slate-900: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--slate-950); color: #f8fafc; margin: 0; overflow: hidden; }
        
        /* Tipografía de Guion */
        .script-font { font-family: 'Courier Prime', monospace; font-size: 12pt; line-height: 1.2; }
        
        /* Contenedor del Papel */
        .paper-container { background-color: #1e293b; flex: 1; overflow-y: auto; padding-bottom: 100px; }
        #paper {
            width: 210mm; min-height: 297mm; background: white; color: black;
            padding: 25mm; margin: 40px auto; outline: none; white-space: pre-wrap;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Estilos Obligatorios de Guion */
        #paper div { margin: 0; padding: 0; min-height: 1.2em; }
        .slugline { font-weight: bold; text-transform: uppercase; margin-top: 25px !important; margin-bottom: 10px !important; }
        .action { margin-top: 10px !important; margin-bottom: 10px !important; }
        .character { width: 50%; margin: 20px auto 0 auto !important; text-align: center; text-transform: uppercase; }
        .parenthetical { width: 35%; margin: 0 auto !important; text-align: center; }
        .parenthetical::before { content: "("; } .parenthetical::after { content: ")"; }
        .dialogue { width: 70%; margin: 0 auto 10px auto !important; text-align: center; }
        .transition { width: 30%; margin: 20px 0 0 auto !important; text-align: right; font-weight: bold; text-transform: uppercase; }

        /* Notificaciones Toast */
        #toast { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.26, 1.55); z-index: 1000;
        }
        #toast.show { bottom: 30px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="toast" class="bg-slate-800 border border-slate-700 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
        <span id="toast-icon" class="text-emerald-500 font-bold">✓</span>
        <span id="toast-msg" class="text-sm font-medium">Guardado</span>
    </div>

    <div id="landing" class="h-screen w-full flex flex-col items-center justify-center bg-slate-950">
        <h1 class="text-7xl font-black mb-8 tracking-tighter italic">E-<span class="text-blue-500">WRITER</span></h1>
        <button onclick="authAction('login')" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-2xl font-bold text-lg transition-all shadow-xl shadow-blue-500/20">
            Entrar con Google
        </button>
    </div>

    <div id="editor-ui" class="hidden h-screen flex flex-col">
        <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-6">
                <span class="text-blue-500 font-black text-xl">EW</span>
                <input type="text" id="script-title" class="bg-slate-800 border-none rounded-lg px-4 py-1 text-slate-300 w-64 text-sm focus:ring-2 focus:ring-blue-600" value="Mi Guion">
            </div>
            <div class="flex items-center gap-4">
                <img id="user-img" src="" class="w-8 h-8 rounded-full border border-slate-700">
                <button onclick="authAction('logout')" class="text-xs text-slate-500 hover:text-white">CERRAR SESIÓN</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-16 bg-slate-950 border-r border-slate-800 flex flex-col items-center py-6 gap-6 shrink-0">
                <div class="flex flex-col gap-4 border-b border-slate-800 pb-6">
                    <button onclick="newProject()" title="Nuevo" class="p-2 text-blue-400 hover:bg-blue-400/10 rounded-lg transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                    <button onclick="cloudSave()" title="Guardar" class="p-2 text-emerald-500 hover:bg-emerald-500/10 rounded-lg transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                    </button>
                    <button onclick="openLoadModal()" title="Cargar" class="p-2 text-amber-500 hover:bg-amber-500/10 rounded-lg transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9l-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </button>
                    <button onclick="exportPDF()" title="PDF" class="p-2 text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </button>
                </div>
                <div class="flex flex-col gap-4 text-xl">
                    <button onclick="setFormat('slugline')" title="Escena">🎬</button>
                    <button onclick="setFormat('action')" title="Acción">📝</button>
                    <button onclick="setFormat('character')" title="Personaje">👤</button>
                    <button onclick="setFormat('parenthetical')" title="Paréntesis">💬</button>
                    <button onclick="setFormat('dialogue')" title="Diálogo">🗣️</button>
                    <button onclick="setFormat('transition')" title="Transición">🎞️</button>
                </div>
            </aside>

            <main class="paper-container">
                <div id="paper" class="script-font" contenteditable="true" spellcheck="false">
                    <div class="slugline">INT. APARTAMENTO - DÍA</div>
                    <div class="action">Escribe tu primera acción aquí...</div>
                </div>
            </main>

            <aside class="w-64 bg-slate-900 border-l border-slate-800 p-6 shrink-0 flex flex-col gap-8">
                <div>
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Análisis</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm"><span>Escenas:</span> <span id="stat-scenes" class="font-bold text-blue-400">1</span></div>
                        <div class="flex justify-between text-sm"><span>Páginas:</span> <span id="stat-pages" class="font-bold text-blue-400">1</span></div>
                    </div>
                </div>
                <div class="flex-1 flex flex-col overflow-hidden">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Personajes</h3>
                    <div id="character-list" class="flex flex-wrap gap-2 overflow-y-auto content-start"></div>
                </div>
            </aside>
        </div>
    </div>

    <div id="load-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur z-[100] flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Mis Proyectos</h2>
            <div id="projects-list" class="space-y-2 max-h-60 overflow-y-auto mb-6 pr-2"></div>
            <button onclick="closeModal()" class="w-full py-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVpaNVbN_odbvwUzLwLCJEvCcVaU58mFo",
            authDomain: "ewriter-ed922.firebaseapp.com",
            projectId: "ewriter-ed922",
            storageBucket: "ewriter-ed922.firebasestorage.app",
            messagingSenderId: "74648101150",
            appId: "1:74648101150:web:a390feefe57d65e09be90f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let userUID = null;

        // NOTIFICACIONES
        window.toast = (msg, err = false) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = err ? '✕' : '✓';
            document.getElementById('toast-icon').className = err ? 'text-red-500' : 'text-emerald-500';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        // AUTH
        window.authAction = (t) => t === 'login' ? signInWithPopup(auth, provider) : signOut(auth);
        onAuthStateChanged(auth, u => {
            if(u) {
                userUID = u.uid;
                document.getElementById('landing').classList.add('hidden');
                document.getElementById('editor-ui').classList.remove('hidden');
                document.getElementById('user-img').src = u.photoURL;
                toast("Sesión iniciada");
                openLoadModal();
            } else {
                userUID = null;
                document.getElementById('landing').classList.remove('hidden');
                document.getElementById('editor-ui').classList.add('hidden');
            }
        });

        // FORMATEO ROBUSTO
        window.setFormat = (cls) => {
            document.execCommand('formatBlock', false, 'div');
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                let range = selection.getRangeAt(0);
                let container = range.commonAncestorContainer;
                if (container.nodeType === 3) container = container.parentNode;
                
                // Asegurar que aplicamos la clase al DIV superior
                const element = container.closest('#paper > div');
                if (element) {
                    element.className = cls;
                }
            }
            analyze();
        };

        window.newProject = async () => {
            if(confirm("¿Guardar cambios antes?")) await cloudSave();
            document.getElementById('script-title').value = "Nuevo Proyecto";
            document.getElementById('paper').innerHTML = '<div class="slugline">INT. ESCENA - DÍA</div><div class="action">...</div>';
            toast("Nuevo proyecto creado");
            analyze();
        };

        window.cloudSave = async () => {
            if(!userUID) return;
            const title = document.getElementById('script-title').value;
            try {
                await setDoc(doc(db, "users", userUID, "projects", title), {
                    title, html: document.getElementById('paper').innerHTML, date: new Date()
                });
                toast("Guardado en la nube");
            } catch (e) { toast("Error al guardar", true); }
        };

        window.openLoadModal = async () => {
            const list = document.getElementById('projects-list');
            list.innerHTML = '<p class="text-xs text-slate-500">Cargando...</p>';
            document.getElementById('load-modal').classList.remove('hidden');
            const snap = await getDocs(collection(db, "users", userUID, "projects"));
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 bg-slate-800 rounded-xl hover:bg-blue-600 transition-colors text-sm font-medium";
                btn.innerText = p.title;
                btn.onclick = () => {
                    document.getElementById('paper').innerHTML = p.html;
                    document.getElementById('script-title').value = p.title;
                    closeModal();
                    toast("Cargado con éxito");
                    analyze();
                };
                list.appendChild(btn);
            });
        };

        window.closeModal = () => document.getElementById('load-modal').classList.add('hidden');

        window.exportPDF = () => {
            toast("Generando PDF...");
            const opt = { margin: 0, filename: `${document.getElementById('script-title').value}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().from(document.getElementById('paper')).set(opt).save().then(() => toast("Descargado"));
        };

        function analyze() {
            const p = document.getElementById('paper');
            document.getElementById('stat-scenes').innerText = p.querySelectorAll('.slugline').length;
            document.getElementById('stat-pages').innerText = Math.ceil(p.scrollHeight / 1122) || 1;
            
            const chars = [...new Set(Array.from(p.querySelectorAll('.character')).map(el => el.innerText.trim().toUpperCase()))].filter(n => n.length > 0);
            document.getElementById('character-list').innerHTML = chars.map(n => `<span class="px-2 py-1 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-bold rounded uppercase">${n}</span>`).join('');
        }

        // CONTROL DE TECLADO E INTELIGENCIA
        document.getElementById('paper').addEventListener('keydown', e => {
            if (e.key === 'Tab') {
                e.preventDefault();
                setFormat('character');
            }
            if (e.key === 'Enter') {
                // Pequeña espera para que el navegador cree el nuevo DIV
                setTimeout(() => {
                    const selection = window.getSelection();
                    let current = selection.anchorNode;
                    if (current.nodeType === 3) current = current.parentNode;
                    const currentDiv = current.closest('#paper > div');
                    
                    if (currentDiv && currentDiv.previousSibling) {
                        const prevClass = currentDiv.previousSibling.className;
                        
                        // Lógica de flujo
                        if (prevClass === 'slugline') setFormat('action');
                        else if (prevClass === 'character') setFormat('dialogue');
                        else if (prevClass === 'parenthetical') setFormat('dialogue');
                        else if (prevClass === 'transition') setFormat('slugline');
                        else setFormat('action'); // Por defecto acción
                    }
                }, 10);
            }
        });

        document.getElementById('paper').addEventListener('input', analyze);
        
        // Exponer funciones necesarias al global
        window.setFormat = setFormat;
    </script>
</body>
</html>
